name: ledger
version: 1.1.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  image: ^4.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  get: ^4.6.6
  local_auth: ^2.3.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true

  image_path_android: assets/icon/app_icon_ios.png
  image_path_ios: assets/icon/app_icon_ios.png

  adaptive_icon_foreground: assets/icon/app_icon_foreground.png
  adaptive_icon_background: "#F3F6FB"

  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/icon/app_icon_ios.png
    - assets/icon/app_icon_foreground.png
